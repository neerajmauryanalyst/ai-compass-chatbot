responses:

  utter_ai_basics:
    - text: |
        🤖 AI (Artificial Intelligence) refers to machines that can perform tasks requiring human intelligence.

        Examples:
        • Chatbots  
        • Recommendation systems (YouTube, Netflix)  
        • Self-driving cars  

        AI learns from data and improves over time.

  utter_ai_bias:
    - text: |
        ⚖️ AI Bias occurs when AI systems give unfair or incorrect results due to biased data.

        Example:
        • Hiring AI favoring one gender  
        • Facial recognition errors  

        Bias happens because AI learns from human-generated data.

  utter_ai_risks:
    - text: |
        ⚠️ Risks of AI include:

        • Job displacement  
        • Privacy issues  
        • Misuse (deepfakes)  
        • Lack of transparency  

        These risks require careful monitoring and control.

  utter_ai_ethics:
    - text: |
        🧭 AI Ethics focuses on using AI responsibly and fairly.

        Key principles:
        • Fairness  
        • Transparency  
        • Accountability  
        • Privacy  

        Ethics ensures AI benefits society.

  utter_ai_regulations:
    - text: |
        📜 AI Regulations are laws governing AI use.

        Examples:
        • GDPR (data protection)  
        • EU AI Act  
        • India DPDP Act  

        These ensure safe and legal AI usage.

  utter_responsible_ai:
    - text: |
        ✅ Responsible AI means building AI that is:

        • Fair  
        • Safe  
        • Transparent  
        • Accountable  

        It ensures AI works for everyone, not against them.

  utter_fallback:
