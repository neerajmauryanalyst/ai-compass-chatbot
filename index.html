<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Compass</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="header">AI Compass</div>

<div id="chat" class="chat-container"></div>

<div class="input-area">
  <input id="message" placeholder="Type a message here..." />
  
  <div class="send-btn" onclick="sendMessage()">
    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="none" stroke="black" stroke-width="2" viewBox="0 0 24 24">
      <path d="M22 2L11 13"></path>
      <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
    </svg>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
